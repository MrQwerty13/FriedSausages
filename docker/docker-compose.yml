version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: efros
      POSTGRES_PASSWORD: efros_pass
      POSTGRES_DB: efros_ci
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://efros:efros_pass@db:5432/efros_ci
    depends_on:
      - db

volumes:
  pgdata: